apiVersion: apps/v1
kind: Deployment

metadata:
  name: ims-backend
  namespace: ims

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ims-backend

  template:
    metadata:
      labels:
        app: ims-backend

    spec:
      containers:
        - name: backend

          image: ims-backend:dev

          imagePullPolicy: Never

          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service

metadata:
  name: ims-backend
  namespace: ims

spec:
  selector:
    app: ims-backend

  ports:
    - port: 3000
      targetPort: 3000