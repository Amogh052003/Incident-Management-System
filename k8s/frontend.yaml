apiVersion: apps/v1
kind: Deployment

metadata:
  name: ims-frontend
  namespace: ims

spec:
  replicas: 1

  selector:
    matchLabels:
      app: ims-frontend

  template:
    metadata:
      labels:
        app: ims-frontend

    spec:
      containers:
        - name: frontend

          image: IncidentManagementSystem/frontend:latest

          imagePullPolicy: Never

          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service

metadata:
  name: ims-frontend
  namespace: ims

spec:
  selector:
    app: ims-frontend

  ports:
    - port: 3000
      targetPort: 3000