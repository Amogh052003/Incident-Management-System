server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }

  location /incidents {
    proxy_pass http://backend:3000/incidents;
    proxy_http_version 1.1;
  }

  location /workitem {
    proxy_pass http://backend:3000/workitem;
    proxy_http_version 1.1;
  }

  location /topology {
    proxy_pass http://backend:3000/topology;
    proxy_http_version 1.1;
  }

  location /plugins {
    proxy_pass http://backend:3000/plugins;
    proxy_http_version 1.1;
  }

  location /integrations {
    proxy_pass http://backend:3000/integrations;
    proxy_http_version 1.1;
  }

  location /settings {
    proxy_pass http://backend:3000/settings;
    proxy_http_version 1.1;
  }

  location /audit {
    proxy_pass http://backend:3000/audit;
    proxy_http_version 1.1;
  }

  location /socket.io {
    proxy_pass http://backend:3000/socket.io;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }

  location /services {
    proxy_pass http://backend:3000/services;
    proxy_http_version 1.1;
  }

  location /github {
    proxy_pass http://backend:3000/github;
    proxy_http_version 1.1;
  }

  location /repo-mappings {
    proxy_pass http://backend:3000/repo-mappings;
    proxy_http_version 1.1;
  }

  location /health {
    proxy_pass http://backend:3000/health;
    proxy_http_version 1.1;
  }
}
